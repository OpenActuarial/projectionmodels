name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    uses: OpenActuarial/.github/.github/workflows/reusable-ci.yml@main
    with:
      package: projectionmodels
      coverage-min: 95

  # Package-specific lane: the declared actuarialpy floor must stay true.
  actuarialpy-floor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install -e ".[dev]" && python -m pip install "actuarialpy==0.45.0"
      - run: python -c "import actuarialpy; print('actuarialpy', actuarialpy.__version__)"
      - run: pytest
