name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        # Edges of the actuarialpy range declared in pyproject.toml —
        # update these together with the pin.
        actuarialpy-version: ["0.41.0", "0.42.0"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      # Install from the declared dependency set. The tests import the real
      # actuarialpy package; no session-wide fake or stub is used.
      - run: python -m pip install -e ".[dev]"
      - run: python -m pip install "actuarialpy==${{ matrix.actuarialpy-version }}"
      - run: python -c "import actuarialpy; print('actuarialpy', actuarialpy.__version__, actuarialpy.__file__)"
      - run: ruff check src tests examples
      - run: pytest --cov=projectionmodels --cov-report=term-missing --cov-fail-under=95
      - name: Run every documented example against installed dependencies
        shell: bash
        run: |
          while IFS= read -r example; do
            echo "Running ${example}"
            python "${example}" >/dev/null
          done < <(find examples -name "*.py" -type f | sort)
      - run: python -m build

  clean-wheel-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m venv /tmp/projectionmodels-clean
      - run: /tmp/projectionmodels-clean/bin/python -m pip install dist/*.whl
      - name: Smoke test the installed wheel
        run: |
          /tmp/projectionmodels-clean/bin/python - <<'PY'
          import importlib.metadata
          import pathlib
          import tomllib

          import actuarialpy
          import projectionmodels as pm

          expected = tomllib.loads(pathlib.Path("pyproject.toml").read_text())["project"]["version"]
          assert pm.__version__ == expected, (pm.__version__, expected)
          assert importlib.metadata.version("projectionmodels") == expected
          assert len(pm.ProjectionHorizon("2027-01-01", periods=2)) == 2
          print(f"clean wheel install passed: projectionmodels {expected} (actuarialpy {actuarialpy.__version__})")
          PY
